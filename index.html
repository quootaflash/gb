<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Kreatif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        
        .a4-paper {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 25px 50px -12px rgb(15 23 42 / 0.15);
            margin: 30px auto;
            padding: 18mm 20mm;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 11.2pt;
            line-height: 1.68;
            color: #1f2937;
            position: relative;
            box-sizing: border-box;
            overflow: visible;
        }

        @media print {
            .no-print { display: none !important; }
            .a4-paper {
                width: 210mm !important;
                min-height: 297mm !important;
                margin: 0 !important;
                padding: 18mm 20mm !important;
                box-shadow: none !important;
            }
        }
        @page { size: A4 portrait; margin: 0; }

        .section-title {
            font-size: 14pt;
            font-weight: 700;
            color: #0f766e;
            position: relative;
            padding-bottom: 8px;
            margin-bottom: 14px;
        }
        
        .section-title:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(to right, #0f766e, #14b8a6);
            border-radius: 9999px;
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 32pt;
            font-weight: 700;
            letter-spacing: -1px;
            color: #0f766e;
        }

        .profile-photo {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border: 5px solid #f1f5f9;
            box-shadow: 0 15px 30px -10px rgb(15 23 42 / 0.2);
            border-radius: 9999px;
            float: right;
            margin-left: 25px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-teal-50 to-slate-50 font-sans">

    <!-- NAVBAR -->
    <nav class="bg-slate-900 text-white sticky top-0 z-50 no-print shadow-xl">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <i class="fa-solid fa-palette text-3xl text-teal-400"></i>
                <div>
                    <h1 class="text-2xl font-semibold tracking-tight">CV KREATIF</h1>
                    <p class="text-xs text-slate-400 -mt-0.5">Modern & Eye-Catching • v1.0</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-3 text-sm">
                <button onclick="autoSaveDraft()" class="flex items-center gap-x-2 px-5 h-10 bg-white/10 hover:bg-white/20 rounded-2xl font-medium">
                    <i class="fa-solid fa-floppy-disk"></i> <span class="hidden md:inline">Simpan Draft</span>
                </button>
                <button onclick="saveAsImage()" class="flex items-center gap-x-2 px-5 h-10 bg-violet-600 hover:bg-violet-700 text-white rounded-2xl font-medium">
                    <i class="fa-solid fa-image"></i> PNG
                </button>
                <button onclick="generatePDF()" class="flex items-center gap-x-2 px-6 h-10 bg-teal-600 hover:bg-teal-700 text-white rounded-2xl font-medium">
                    <i class="fa-solid fa-file-pdf"></i> PDF
                </button>
                <button onclick="printLetter()" class="flex items-center gap-x-2 px-6 h-10 bg-white text-slate-950 hover:bg-slate-100 rounded-2xl font-medium">
                    <i class="fa-solid fa-print"></i> Cetak
                </button>
                <button onclick="clearForm()" class="flex items-center justify-center w-10 h-10 text-red-400 hover:text-red-500 rounded-2xl">
                    <i class="fa-solid fa-trash text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- FORM INPUT -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow-2xl p-8 no-print overflow-auto max-h-screen">
                <div class="mb-8">
                    <h2 class="text-2xl font-semibold text-teal-700">CV Kreatif Modern</h2>
                    <p class="text-teal-600 text-sm mt-1">Desain Fresh & Profesional</p>
                </div>
                
                <div class="space-y-10">
                    <!-- Foto -->
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-2">Foto Profil (Lingkaran)</label>
                        <input type="file" id="foto-upload" accept="image/*" class="hidden" onchange="previewFoto(this)">
                        <button onclick="document.getElementById('foto-upload').click()" 
                                class="w-full h-36 border-2 border-dashed border-teal-300 hover:border-teal-500 rounded-3xl flex flex-col items-center justify-center text-slate-500">
                            <i class="fa-solid fa-user-circle text-5xl mb-3"></i>
                            <span class="text-sm font-medium">Upload Foto</span>
                        </button>
                        <img id="foto-preview" class="hidden mx-auto mt-4 rounded-2xl shadow-md" style="width:110px; height:110px; object-fit:cover;">
                    </div>

                    <!-- Data Diri -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Data Diri</h3>
                        <input id="nama" type="text" value="Muhammad Hafis" placeholder="Nama Lengkap" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none mb-4" oninput="updatePreview()">
                        
                        <div class="grid grid-cols-2 gap-4">
                            <input id="telepon" type="tel" value="0856-1234-5678" placeholder="No. Telepon" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" oninput="updatePreview()">
                            <input id="email" type="email" value="hafis@example.com" placeholder="Email" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" oninput="updatePreview()">
                        </div>
                        <input id="alamat" type="text" value="Paninggaran, Pekalongan, Jawa Tengah" placeholder="Domisili" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none mt-4" oninput="updatePreview()">
                        <input id="linkedin" type="text" value="linkedin.com/in/hafis" placeholder="LinkedIn / Portfolio" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none mt-3" oninput="updatePreview()">
                    </div>

                    <!-- Ringkasan -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Ringkasan Profesional</h3>
                        <textarea id="ringkasan" rows="4" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" 
                                  oninput="updatePreview()">Fresh Graduate Teknik Jaringan Komputer & Telekomunikasi yang kreatif dan teknis. Passionate dalam IT Support, desain web, dan troubleshooting. Siap berkontribusi dengan ide segar dan solusi inovatif.</textarea>
                    </div>

                    <!-- Pengalaman Kerja -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-3">Pengalaman Kerja</h3>
                        <div id="pengalaman-container" class="space-y-4"></div>
                        <button onclick="tambahPengalaman()" class="mt-3 flex items-center gap-2 text-teal-600 hover:text-teal-700 text-sm font-medium">
                            <i class="fa-solid fa-plus"></i> Tambah Pengalaman
                        </button>
                    </div>

                    <!-- Pengalaman Magang -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-3">Pengalaman Magang</h3>
                        <div id="magang-container" class="space-y-4"></div>
                        <button onclick="tambahMagang()" class="mt-3 flex items-center gap-2 text-teal-600 hover:text-teal-700 text-sm font-medium">
                            <i class="fa-solid fa-plus"></i> Tambah Magang
                        </button>
                    </div>

                    <!-- Pendidikan -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-3">Pendidikan</h3>
                        <div id="pendidikan-container" class="space-y-4"></div>
                        <button onclick="tambahPendidikan()" class="mt-3 flex items-center gap-2 text-teal-600 hover:text-teal-700 text-sm font-medium">
                            <i class="fa-solid fa-plus"></i> Tambah Pendidikan
                        </button>
                    </div>

                    <!-- Keterampilan -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Keterampilan</h3>
                        <textarea id="keterampilan" rows="6" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" 
                                  oninput="updatePreview()">• Microsoft Office & Google Workspace
• HTML, CSS, Tailwind CSS, JavaScript
• Network Administration & Troubleshooting
• UI/UX Design Basics (Figma)
• Adobe Photoshop & Illustrator
• Bahasa Inggris (Intermediate)</textarea>
                    </div>

                    <!-- Proyek & Sertifikasi -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Proyek & Sertifikasi</h3>
                        <textarea id="sertifikasi" rows="4" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" 
                                  oninput="updatePreview()">• Sistem Monitoring Jaringan Sekolah (Web-based)
• Cisco Networking Academy Certificate
• Proyek Desain Website Sekolah</textarea>
                    </div>
                </div>
            </div>

            <!-- PREVIEW -->
            <div class="lg:col-span-7">
                <div class="preview-header flex justify-between items-center mb-4 px-2 no-print">
                    <h3 class="font-semibold text-teal-700 flex items-center gap-x-2">
                        <i class="fa-solid fa-eye"></i> Pratinjau CV Kreatif
                    </h3>
                    <span class="text-xs bg-teal-100 text-teal-700 px-4 py-1.5 rounded-3xl">FORMAT A4</span>
                </div>
                
                <div class="preview-wrapper bg-white p-6 rounded-3xl shadow-inner overflow-x-auto">
                    <div id="cv" class="a4-paper mx-auto">
                        <div id="cv-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cvData = { foto: null };

        function tambahPengalaman() {
            const container = document.getElementById('pengalaman-container');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = "border border-slate-100 p-5 rounded-2xl space-y-3";
            div.innerHTML = `
                <input type="text" id="exp-posisi-${index}" placeholder="Posisi / Jabatan" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" oninput="updatePreview()">
                <input type="text" id="exp-perusahaan-${index}" placeholder="Nama Perusahaan" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" oninput="updatePreview()">
                <input type="text" id="exp-periode-${index}" placeholder="Periode" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" oninput="updatePreview()">
                <textarea id="exp-deskripsi-${index}" rows="3" placeholder="Deskripsi tugas & pencapaian" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" oninput="updatePreview()"></textarea>
            `;
            container.appendChild(div);
            updatePreview();
        }

        function tambahMagang() {
            const container = document.getElementById('magang-container');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = "border border-slate-100 p-5 rounded-2xl space-y-3";
            div.innerHTML = `
                <input type="text" id="mag-posisi-${index}" placeholder="Posisi Magang" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" oninput="updatePreview()">
                <input type="text" id="mag-perusahaan-${index}" placeholder="Perusahaan / Instansi" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" oninput="updatePreview()">
                <input type="text" id="mag-periode-${index}" placeholder="Periode" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" oninput="updatePreview()">
                <textarea id="mag-deskripsi-${index}" rows="3" placeholder="Deskripsi tugas & pencapaian" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" oninput="updatePreview()"></textarea>
            `;
            container.appendChild(div);
            updatePreview();
        }

        function tambahPendidikan() {
            const container = document.getElementById('pendidikan-container');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = "border border-slate-100 p-5 rounded-2xl space-y-3";
            div.innerHTML = `
                <input type="text" id="pend-nama-${index}" placeholder="Sekolah / Universitas & Jurusan" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" oninput="updatePreview()">
                <input type="text" id="pend-tahun-${index}" placeholder="Tahun (contoh: 2023 - 2026)" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-teal-500 outline-none" oninput="updatePreview()">
            `;
            container.appendChild(div);
            updatePreview();
        }

        function previewFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    cvData.foto = e.target.result;
                    document.getElementById('foto-preview').src = cvData.foto;
                    document.getElementById('foto-preview').classList.remove('hidden');
                    updatePreview();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updatePreview() {
            const nama = document.getElementById('nama').value || "Nama Lengkap";
            const telepon = document.getElementById('telepon').value;
            const email = document.getElementById('email').value;
            const alamat = document.getElementById('alamat').value;
            const linkedin = document.getElementById('linkedin').value;
            const ringkasan = document.getElementById('ringkasan').value;
            const keterampilan = document.getElementById('keterampilan').value;
            const sertifikasi = document.getElementById('sertifikasi').value;

            const fotoHTML = cvData.foto 
                ? `<img src="${cvData.foto}" class="profile-photo" alt="Foto Profil">` 
                : `<div class="w-[110px] h-[110px] float-right ml-6 mb-4 bg-slate-100 rounded-full flex items-center justify-center text-slate-300 border-4 border-slate-200"><i class="fa-solid fa-user text-6xl"></i></div>`;

            // Pengalaman Kerja
            let expHTML = '';
            document.querySelectorAll('#pengalaman-container > div').forEach((child, i) => {
                const posisi = child.querySelector(`#exp-posisi-${i}`)?.value.trim() || '';
                const perusahaan = child.querySelector(`#exp-perusahaan-${i}`)?.value.trim() || '';
                const periode = child.querySelector(`#exp-periode-${i}`)?.value.trim() || '';
                const deskripsi = child.querySelector(`#exp-deskripsi-${i}`)?.value.trim() || '';
                if (posisi || perusahaan) {
                    expHTML += `<div class="mb-8"><p class="font-semibold text-lg">${posisi} — ${perusahaan}</p><p class="text-teal-600 text-sm">${periode}</p><div class="mt-3 text-slate-700 whitespace-pre-line">${deskripsi.replace(/\n/g, '<br>')}</div></div>`;
                }
            });

            // Pengalaman Magang
            let magangHTML = '';
            document.querySelectorAll('#magang-container > div').forEach((child, i) => {
                const posisi = child.querySelector(`#mag-posisi-${i}`)?.value.trim() || '';
                const perusahaan = child.querySelector(`#mag-perusahaan-${i}`)?.value.trim() || '';
                const periode = child.querySelector(`#mag-periode-${i}`)?.value.trim() || '';
                const deskripsi = child.querySelector(`#mag-deskripsi-${i}`)?.value.trim() || '';
                if (posisi || perusahaan) {
                    magangHTML += `<div class="mb-8"><p class="font-semibold">${posisi} — ${perusahaan}</p><p class="text-teal-600 text-sm">${periode}</p><div class="mt-3 text-slate-700 whitespace-pre-line">${deskripsi.replace(/\n/g, '<br>')}</div></div>`;
                }
            });

            // Pendidikan
            let pendHTML = '';
            document.querySelectorAll('#pendidikan-container > div').forEach((child, i) => {
                const nama = child.querySelector(`#pend-nama-${i}`)?.value.trim() || '';
                const tahun = child.querySelector(`#pend-tahun-${i}`)?.value.trim() || '';
                if (nama) pendHTML += `<div class="mb-6"><p class="font-semibold">${nama}</p><p class="text-slate-600">${tahun}</p></div>`;
            });

            const contentHTML = `
                <div class="overflow-hidden">
                    ${fotoHTML}
                    <h1 class="name">${nama}</h1>
                    <div class="mt-3 flex flex-wrap gap-x-6 gap-y-1 text-sm text-slate-600">
                        <span>${telepon}</span>
                        <span>${email}</span>
                        <span>${alamat}</span>
                        ${linkedin ? `<span>${linkedin}</span>` : ''}
                    </div>
                </div>

                ${ringkasan ? `<div class="mt-12"><h2 class="section-title">TENTANG SAYA</h2><p class="text-slate-700 leading-relaxed">${ringkasan}</p></div>` : ''}

                ${expHTML ? `<div class="mt-12"><h2 class="section-title">PENGALAMAN KERJA</h2>${expHTML}</div>` : ''}

                ${magangHTML ? `<div class="mt-12"><h2 class="section-title">PENGALAMAN MAGANG</h2>${magangHTML}</div>` : ''}

                <div class="mt-12"><h2 class="section-title">PENDIDIKAN</h2><div class="mt-5">${pendHTML || '<p class="text-slate-500">Tambahkan pendidikan Anda</p>'}</div></div>

                <div class="mt-12"><h2 class="section-title">KETERAMPILAN</h2><div class="text-slate-700 whitespace-pre-line leading-relaxed mt-5">${keterampilan.replace(/\n/g, '<br>')}</div></div>

                ${sertifikasi ? `<div class="mt-12"><h2 class="section-title">PROYEK & SERTIFIKASI</h2><div class="text-slate-700 whitespace-pre-line leading-relaxed mt-5">${sertifikasi.replace(/\n/g, '<br>')}</div></div>` : ''}
            `;

            document.getElementById('cv-content').innerHTML = contentHTML;
        }

        function printLetter() { updatePreview(); window.print(); }
        function generatePDF() {
            if (confirm('Simpan sebagai PDF?')) printLetter();
        }
        function saveAsImage() {
            const cv = document.getElementById('cv');
            html2canvas(cv, { scale: 3, backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `CV_Kreatif_${document.getElementById('nama').value.replace(/[^a-zA-Z0-9]/g, '_')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
        function autoSaveDraft() { alert('Draft CV berhasil disimpan!'); }
        function clearForm() { if (confirm('Reset semua data?')) location.reload(); }

        // Inisialisasi
        window.onload = () => {
            tambahPendidikan();
            document.getElementById('pend-nama-0').value = "SMK Nurul Ummah Paninggaran - Teknik Jaringan Komputer dan Telekomunikasi";
            document.getElementById('pend-tahun-0').value = "2023 - 2026";

            tambahPengalaman();
            document.getElementById('exp-posisi-0').value = "IT Support & Web Developer";
            document.getElementById('exp-perusahaan-0').value = "PT. ABC Digital";
            document.getElementById('exp-periode-0').value = "Januari - Maret 2025";
            document.getElementById('exp-deskripsi-0').value = "• Maintenance jaringan dan troubleshooting\n• Pembuatan website sekolah menggunakan Tailwind CSS";

            tambahMagang();

            updatePreview();
        };
    </script>
</body>
</html>
